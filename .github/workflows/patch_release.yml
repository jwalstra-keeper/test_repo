name: Increment patch version on main

on:
  workflow_dispatch:
    inputs:

jobs:

  release:
    name: Increment patch version on main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout release branch"
        uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: "Bump patch version"
        id: bump
        run: |
          VERSION_FILE="kdnrm/__version__.py"
          CURRENT=$(python3 -c "exec(open('$VERSION_FILE').read()); print(__version__)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          PATCH=$((PATCH + 1))

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "__version__ = '${NEW_VERSION}'" > $VERSION_FILE
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: "Commit version bump"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kdnrm/__version__.py
          git commit -m "Bump version to ${{ steps.bump.outputs.version }}"
          git push origin release

      - name: "Generate release notes"
        run: |
          git fetch origin main                                                                                                                
          git fetch origin --tags  
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.bump.outputs.version }}"
          MINOR_BASE_TAG=$(git tag --list "${MAJOR}.${MINOR}.*" | sort -V | head -1)
          git log ${MINOR_BASE_TAG}..origin/main --pretty=format:"- %s" > release_notes.md
          git add release_notes.md
          git commit -m "Add patch to release notes for ${{ steps.bump.outputs.version }}"
          git push origin release

      - name: "Rebase release on main"
        run: |
          git checkout release
          git rebase origin/main
          git push origin release --force
