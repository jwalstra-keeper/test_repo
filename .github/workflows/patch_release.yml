name: Increment patch version on main

on:
  workflow_dispatch:
    inputs:

jobs:

  release:
    name: Increment patch version on main
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout main"
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT }}

      - name: "Bump patch version"
        id: bump
        run: |
          VERSION_FILE="kdnrm/__version__.py"
          CURRENT=$(python3 -c "exec(open('$VERSION_FILE').read()); print(__version__)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          PATCH=$((PATCH + 1))

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "__version__ = '${NEW_VERSION}'" > $VERSION_FILE
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: "Generate release notes"
        run: |
          git fetch origin --tags
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ steps.bump.outputs.version }}"
          PREV_TAG="${MAJOR}.${MINOR}.$((PATCH - 1))"
          printf "\n" >> release_notes.md
          git log ${PREV_TAG}..HEAD --pretty=tformat:"- %s" >> release_notes.md

      - name: "Commit and push to main"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kdnrm/__version__.py release_notes.md
          git commit -m "Bump version to ${{ steps.bump.outputs.version }}"
          git push origin main

      - name: "Rebase release on main"
        run: |
          git fetch origin main
          git checkout release
          git rebase -X ours origin/main
          git push origin release --force