name: Release

on:
  workflow_dispatch:
    inputs:
      bump_minor:
        type: boolean
        description: Increment minor version and reset patch to 0. Default increments patch only.
        default: false

jobs:

  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: "Checkout release branch"
        uses: actions/checkout@v4
        with:
          ref: release
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Bump version"
        id: bump
        run: |
          VERSION_FILE="kdnrm/__version__.py"
          CURRENT=$(python3 -c "exec(open('$VERSION_FILE').read()); print(__version__)")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          if [ "${{ github.event.inputs.bump_minor }}" == "true" ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "__version__ = '${NEW_VERSION}'" > $VERSION_FILE
          echo "version=${NEW_VERSION}" >> $GITHUB_OUTPUT

      - name: "Commit version bump"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kdnrm/__version__.py
          git commit -m "Bump version to ${{ steps.bump.outputs.version }}"
          git push origin release

      - name: "Generate release notes"
        run: |
          git log main..release --pretty=format:"- %s" > release_notes.md
          git add release_notes.md
          git commit -m "Add release notes for ${{ steps.bump.outputs.version }}"
          git push origin release

      - name: "Merge release into main"
        run: |
          git checkout main
          git pull origin main
          git merge --no-ff release -m "Release ${{ steps.bump.outputs.version }}: merge release into main"
          git push origin main

      - name: "Rebase release on main"
        run: |
          git checkout release
          git rebase main
          git push origin release --force
