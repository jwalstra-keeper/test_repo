name: Build Wheel

on:

  push:
    branches:
      - main
    paths:
      - 'kdnrm/__version__.py'

  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"

jobs:
  build_linux:
    runs-on: ubuntu-latest
#    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Wheel
        run: |
          python3 -m build --wheel
        shell: bash

      - name: Extract version from __version__.py
        id: get_version
        run: |
          VERSION=$(python -c 'from kdnrm.__version__ import __version__; print(__version__)')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

      - name: Generate release notes
        run: |
          echo "## What's Changed" > release_notes_full.md
          echo "" >> release_notes_full.md
          cat release_notes.md >> release_notes_full.md
          echo "" >> release_notes_full.md
          echo "KDNRM Python Wheel Release ${{ steps.get_version.outputs.VERSION }}" >> release_notes_full.md
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: KDNRMWheel
          retention-days: 3
          path: dist/kdnrm-${{ steps.get_version.outputs.VERSION }}-py3-none-any.whl
          if-no-files-found: error

      - name: Create and Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/kdnrm-${{ steps.get_version.outputs.VERSION }}-py3-none-any.whl
          name: KDNRM Release ${{ steps.get_version.outputs.VERSION }}
          body_path: release_notes_full.md
          tag_name: ${{ steps.get_version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
